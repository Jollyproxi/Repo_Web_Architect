<!DOCTYPE html>
<html
<head>
    <meta charset="UTF-8">
    <title>Lezione 3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1>Form Control</h1>

    <h3>Modulo di registrazione da compilare</h3>

    <form action="#" autocomplete="on" method ="get">  <!-- action: specifica l'URL a cui inviare i dati del modulo quando viene inviato. 
    autocomplete: specifica se il browser deve abilitare o disabilitare la funzionalità di completamento automatico per i campi del modulo.
    method: specifica il metodo HTTP da utilizzare quando si inviano i dati del modulo.  Con get i dati del modulo vengono inviati come parte dell'URL, 
    mentre con post i dati vengono inviati nel corpo della richiesta HTTP.  e con get il name diventa una chiave -->
        
        <fieldset>
            <legend>Informazioni personali</legend>
            <!-- Anagrafica-->
            <label for="name">Nome</label>
            <input type="text" id="name" name="name" placeholder="Inserisci il tuo nome" required autofocus> <br> <!-- required: obbliga l'utente a compilare il campo prima di inviare il modulo. 
            autofocus: indica che il campo deve essere automaticamente selezionato quando la pagina viene caricata. -->

            <label for="cognome">Cognome</label>
            <input type="text" id="cognome" name="cognome" placeholder="Inserisci il tuo cognome" required> <br>  <!-- imput tag  muto perchè non richiede chiusura  -->

            <label for="data_nascita">Data di nascita</label>
            <input type="date" id="data_nascita" name="data_nascita" required placeholder="Inserisci la tua data di nascita"> <br>

            <label for="eta">Età</label>
            <input type="number" id="eta" name="eta" min="0" max="150" placeholder="Inserisci la tua età" required> <br>

        </fieldset>

        <fildset>
            <legend>Informazioni di contatto</legend>
            <!-- Contatti-->
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Inserisci la tua email" required> <br>

            <label for="telefono">Telefono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Inserisci il tuo numero di telefono" required> <br>

            <label for="sito_web">Sito web</label>
            <input type="url" id="sito_web" name="sito_web" placeholder="Inserisci il tuo sito web" required> <br>

            <label for="orario">Orario</label> 
            <input type="time" id="orario" name="orario" required> <br>

            <label for="cerca">Cerca</label>
            <input type="search" id="cerca" name="cerca" placeholder="Cerca qualcosa..." required> <br>

        </fildset>

        <fieldset>
            <legend>Informazioni di accesso</legend>
            <!-- Accesso-->
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Scegli un username" required> <br>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Scegli una password" required> <br>
        </fieldset>

        <fieldset>
            <legend>Genere</legend>
            <input type="radio" id="maschio" name="genere" value="maschio" required>
            <label for="maschio">Maschio</label> <br>   
            <input type="radio" id="femmina" name="genere" value="femmina" required>
            <label for="femmina">Femmina</label> <br>
            <input type="radio" id="altro" name="genere" value="altro" required>
            <label for="altro">Altro</label> <br>
            
            
        </fieldset>


        <fieldset>
            <legend>Professione</legend>
            <select id="professione" name="professione" required>
                <option value="" selected disabled>Seleziona la tua professione</option>
                <option value="studente">Studente</option>
                <option value="insegnante">Insegnante</option>
                <option value="ingegnere">Ingegnere</option>
                <option value="medico">Medico</option>
                <option value="sviluppatore_web">Sviluppatore Web</option>
                <option value="mafioso">Mafioso</option>
                <option value="criminale">Criminale</option>
                <option value="avvocato">Avvocato</option>
                <option value="criptoguru">Criptoguru</option>
                <option value="altro">Altro</option>
            </select> <br>



            <label for="interessi">Auto preferita</label>
            <select id="interessi" name="interessi" required>
                <option value="" selected disabled>Seleziona la tua auto preferita</option>
                <optgroup label="Svedesi">
                    <option value="volvo">Volvo</option>
                    <option value="saab">Saab</option>
                </optgroup>
                <optgroup label="Tedesche">
                    <option value="mercedes">Mercedes</option>
                    <option value="audi">Audi</option>
                    <option value="bmw">BMW</option>
                </optgroup>
                <optgroup label="Italiane">
                    <option value="fiat">Fiat</option>
                    <option value="lancia">Lancia</option>
                    <option value="ferrari">Ferrari</option>
                    <option value="lamborghini">Lamborghini</option>
                    <option value="alfa_romeo">Alfa Romeo</option>
                </optgroup>                    
            </select> <br>

            <label for="colour">Colore</label>
            <input type="color" id="colour" name="colour" value="#ff0000" required> <br>



        </fieldset>

        <fieldset>

            <legend>Approvazioni</legend>
            <input type="checkbox" id="termini" name="termini" required>
            <label for="termini">Accetto i termini e le condizioni</label> <br>
            <input type="checkbox" id="newsletter" name="newsletter">
            <label for="newsletter">Iscriviti alla newsletter</label> <br>
            <input type="checkbox" id="offerte" name="offerte">
            <label for="offerte">Ricevi offerte speciali</label> <br>
            <label for="privacy">Privacy</label>
            <input type="checkbox" id="privacy" name="privacy" required>
            <label for="privacy">Accetto la politica sulla privacy</label> <br>
        </fieldset>

        <fieldset>
            <legend>Altro</legend>
            <label for="rating">Valuta il nostro servizio (1-10)</label>
            <input type="range" id="rating" name="rating" min="1" max="10" value="3" step="1" required>  <br>


            <label for="messaggio">Messaggio</label>
            <textarea id="messaggio" name="messaggio" placeholder="Scrivi un messaggio..." required rows="4" cols="10"></textarea> <br>
        </fieldset>

</body>
</html>
