<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Flexbox</title>
                <link rel="stylesheet" href="../css/style.css">
                <link rel="stylesheet" href="../css/reset.css">

        </head>
        <body>
            <h1>Flexbox</h1>

            <p>Flexbox è un modulo CSS che consente di creare layout flessibili e adattabili. 
                Permette di distribuire lo spazio tra gli elementi in un contenitore e di allinearli in modo efficiente, anche quando le dimensioni degli elementi sono sconosciute o dinamiche.</p>


            <div class="flex-container">
                <div class="flex-item">1</div>
                <div class="flex-item">2</div>
                <div class="flex-item">3</div>
                <div class="flex-item">4</div>
                
            </div>
        </body>
    </html>
